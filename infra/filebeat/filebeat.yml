filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    json.keys_under_root: true
    json.add_error_key: true

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  - drop_event:
      when:
        not:
          contains:
            container.name: "storylord"

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "storylord-%{+yyyy.MM.dd}"

setup.template.name: "storylord"
setup.template.pattern: "storylord-*"
setup.template.enabled: false
setup.ilm.enabled: false

setup.kibana:
  host: "kibana:5601"
